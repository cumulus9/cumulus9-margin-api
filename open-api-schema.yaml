            type: object
            properties:
                request_id:
                    type: string
                    example: '5c09862d8d690f8d821b47762ef06a6f'
                username:
                    type: string
                    example: 'user@cumulus9.com'
                status:
                    type: string
                    enum: [success, failed, loading]
                    example: success
                data:
                    type: array
                    items:
                        $ref: '#/components/schemas/AccountResult'
                runtime:
                    description: Processing time in milliseconds.
                    type: integer
                    example: 114
                parameters:
                    description: Margin model parameters used in the calculation.
                    type: object
                    additionalProperties: true
                memo:
                    type: string
                error:
                    type: object
                    additionalProperties: true

        BatchAccepted:
            description: Response when a batch job is accepted.
            type: object
            properties:
                batch_id:
                    description: UUID to poll for status.
                    type: string
                    format: uuid
                    example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890'

        BatchStatus:
            description: Status of a batch job.
            type: object
            properties:
                batch_id:
                    type: string
                    format: uuid
                status:
                    type: string
                    enum: [queued, processing, completed, failed, completed_with_errors]
                    example: processing
                queue_position:
                    description: Position in queue (present only when status is `queued`).
                    type: integer
                created_at:
                    description: ISO 8601 submission timestamp.
                    type: string
                    format: date-time
                completed_at:
                    description: ISO 8601 completion timestamp (null while in progress).
                    type: string
                    format: date-time
                    nullable: true
                runtime_ms:
                    description: Elapsed time in milliseconds.
                    type: integer
                completed_pct:
                    description: Completion percentage (0-100).
                    type: number

        HealthcheckEntry:
            type: object
            properties:
                service:
                    type: string
                    example: span
                status:
                    type: string
                    example: OK
                version:
                    type: string
                    example: '0.0.13'
                healthcheck:
                    type: integer
                    example: 1719582349309
                start_time:
                    type: string
                    example: '2024-06-28T04:11:01.377Z'
                parameters:
                    oneOf:
                        - type: object
                          additionalProperties: true
                        - type: string
            additionalProperties: true

        BadRequestError:
            type: object
            properties:
                error:
                    type: string
                    example: Invalid request body

        UnauthorizedError:
            type: object
            properties:
                error:
                    type: object
                    properties:
                        message:
                            type: string
                            example: 'Invalid or expired API key'

        RateLimitedError:
            type: object
            properties:
                error:
                    type: string
                    example: Rate limit exceeded

        InternalServerError:
            type: object
            properties:
                error:
                    type: string
                    example: Internal Server Error

    responses:
        SyncResults:
